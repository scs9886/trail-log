<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trail Log">
<meta name="theme-color" content="#2D4A2D">
<title>North Idaho Trail Log</title>
<style>
  :root {
    --pine: #2D4A2D; --pine-mid: #3D6B3D; --pine-light: #5A8C5A;
    --moss: #7A9E6A; --bark: #8B6914; --stone: #6B7B6B;
    --cream: #F5F0E8; --bg: #EEF2EA; --card: #FAFAF6; --border: #D4CEC4;
    --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2A3A2A;overscroll-behavior:none}
  body{display:flex;flex-direction:column}

  .header{background:var(--pine);padding:calc(var(--safe-top) + 14px) 16px 14px;position:sticky;top:0;z-index:100;flex-shrink:0}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .header-title{display:flex;align-items:center;gap:8px}
  .header-title h1{color:#E8F4E8;font-size:18px;font-weight:700}
  .header-sub{color:#8FB88F;font-size:11px;margin-top:1px}
  .header-right{display:flex;align-items:center;gap:8px}
  .version-tag{color:#4A6B4A;font-size:10px;font-weight:600;letter-spacing:0.04em}
  .icon-btn{background:rgba(255,255,255,0.12);border:none;border-radius:8px;color:#C8E8C8;font-size:18px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .stat{background:rgba(255,255,255,0.09);border-radius:8px;padding:8px 4px;text-align:center}
  .stat-val{color:#C8E8C8;font-size:18px;font-weight:700;line-height:1}
  .stat-label{color:#6A8F6A;font-size:10px;margin-top:2px}

  .search-wrap{position:relative}
  .search-input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:none;font-size:15px;background:rgba(255,255,255,0.12);color:#E8F4E8;outline:none}
  .search-input::placeholder{color:#7A9F7A}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#7A9F7A;font-size:15px;pointer-events:none}

  .filter-bar{background:#F5F2EC;border-bottom:1px solid #D8D0C4;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-row{display:flex;gap:6px;padding:10px 12px;width:max-content}
  .pill{padding:5px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid #C8D4C0;background:transparent;color:var(--stone);white-space:nowrap;cursor:pointer}
  .pill.active{background:var(--pine-mid);border-color:var(--pine-mid);color:#fff;font-weight:600}
  .pill-sep{width:1px;background:#C8D4C0;margin:4px 0;flex-shrink:0}
  .trail-count{padding:4px 12px 8px;font-size:11px;color:var(--stone);background:#F5F2EC;flex-shrink:0}

  .trail-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px calc(var(--safe-bottom) + 80px)}

  /* Section headers */
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 6px;cursor:pointer;user-select:none}
  .section-title{font-size:12px;font-weight:700;color:var(--pine);text-transform:uppercase;letter-spacing:0.07em;display:flex;align-items:center;gap:6px}
  .section-count{font-size:11px;color:var(--stone);font-weight:400}
  .section-chevron{color:var(--stone);font-size:11px;transition:transform 0.2s}
  .section-chevron.open{transform:rotate(180deg)}
  .section-body{overflow:hidden}

  /* Area cards (expandable, have sub-trails) */
  .area-card{background:var(--card);border-radius:14px;margin-bottom:10px;border:1.5px solid var(--border);overflow:hidden}
  .area-card.has-visited{border-left:4px solid var(--pine-light)}
  .area-header{padding:12px 14px;display:flex;gap:10px;align-items:flex-start;cursor:pointer}
  .area-icon{width:38px;height:38px;border-radius:10px;background:#E8F4E8;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .area-info{flex:1;min-width:0}
  .area-name{font-size:14px;font-weight:700;color:#1A2A1A;line-height:1.3}
  .area-loc{font-size:11px;color:var(--stone);margin-top:2px}
  .area-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .area-progress{font-size:11px;color:var(--pine-light);font-weight:600}
  .chevron{color:var(--stone);font-size:12px;flex-shrink:0;margin-top:4px;transition:transform 0.2s}
  .chevron.open{transform:rotate(180deg)}

  /* Sub-trail list inside area */
  .sub-list{border-top:1px solid #E4DED6}
  .sub-trail{padding:11px 14px 11px 52px;border-bottom:1px solid #EDEAE4;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
  .sub-trail:last-child{border-bottom:none}
  .sub-check{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;border:2px solid #C0B8AC;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
  .sub-check.done{background:var(--pine-light);border-color:var(--pine-light)}
  .sub-info{flex:1;min-width:0}
  .sub-name{font-size:13px;font-weight:600;color:#1A2A1A}
  .sub-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
  .sub-chevron{color:#C0B8AC;font-size:11px;flex-shrink:0;margin-top:2px}

  /* Sub-trail detail */
  .sub-detail{padding:12px 14px 14px 52px;background:#F5F2EE;border-top:1px solid #E4DED6;display:none}
  .sub-detail.open{display:block}
  .detail-summary{font-size:13px;line-height:1.7;color:#3A4A3A;margin-bottom:10px}
  .tips-box{background:#EDF4EB;border-radius:8px;padding:9px 12px;border-left:3px solid var(--moss);margin-bottom:12px}
  .tips-label{font-size:10px;font-weight:700;color:var(--pine);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
  .tips-text{font-size:12px;color:#4A5A4A;line-height:1.6}
  .detail-meta-row{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
  .detail-meta-item{font-size:11px;color:var(--stone);display:flex;align-items:center;gap:3px}
  .section-lbl{font-size:10px;font-weight:700;color:var(--pine);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
  .stars-input{display:flex;gap:3px;margin-bottom:12px}
  .star-btn{font-size:22px;background:none;border:none;cursor:pointer;padding:0;line-height:1}
  .notes-tap{min-height:44px;padding:9px 11px;border-radius:8px;cursor:text;background:#F2EDE6;border:1.5px dashed #C8B898;font-size:13px;line-height:1.6;margin-bottom:12px}
  .notes-tap.filled{color:#3A4A3A}
  .notes-tap.empty{color:#A89878}
  .notes-area{width:100%;min-height:64px;padding:9px 11px;border-radius:8px;border:1.5px solid #C8B898;background:#F2EDE6;font-size:13px;line-height:1.6;color:#3A4A3A;font-family:inherit;resize:none;outline:none;margin-bottom:8px}
  .btn-row{display:flex;gap:8px;align-items:center;justify-content:space-between}
  .btn-visit{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;font-family:inherit}
  .btn-visit.mark{background:var(--pine);color:#E8F4E8;border-color:var(--pine)}
  .btn-visit.unmark{background:#FFF0E8;color:#8B4A1A;border-color:#D4956A}
  .btn-remove{padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:#A87878;border:1.5px solid #D4B8B8;font-family:inherit}
  .btn-save{padding:6px 13px;border-radius:6px;background:var(--pine-mid);color:#fff;border:none;cursor:pointer;font-size:13px;font-family:inherit;margin-right:7px}
  .btn-cancel-sm{padding:6px 13px;border-radius:6px;background:transparent;color:var(--stone);border:1px solid #C0B8AC;cursor:pointer;font-size:13px;font-family:inherit}

  /* Single trail cards (no sub-list) */
  .trail-card{background:var(--card);border-radius:14px;margin-bottom:10px;border:1.5px solid var(--border);overflow:hidden}
  .trail-card.visited{border-left:4px solid var(--pine-light)}
  .card-header{padding:12px 14px;display:flex;gap:10px;align-items:flex-start;cursor:pointer}
  .visit-btn{width:26px;height:26px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid #C0B8AC;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
  .visit-btn.done{background:var(--pine-light);border-color:var(--pine-light)}
  .card-info{flex:1;min-width:0}
  .card-name{font-size:14px;font-weight:700;color:#1A2A1A;line-height:1.3}
  .card-loc{font-size:11px;color:var(--stone);margin-top:2px}
  .card-meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
  .card-detail{border-top:1px solid #E4DED6;padding:13px 14px;display:none}
  .card-detail.open{display:block}

  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap}
  .badge-beginner{background:#E8F4E8;color:#2D4A2D;border-color:#7A9E6A}
  .badge-intermediate{background:#FFF3E0;color:#5D3A00;border-color:#C4A882}
  .badge-advanced{background:#FDEAEA;color:#5A1A1A;border-color:#C47A7A}
  .badge-xc{background:#E8F0F5;color:#1A3A4A;border-color:#7BA7BC}
  .badge-flow{background:#F5EDE8;color:#4A2D1A;border-color:#C4956A}
  .stars-sm{color:var(--bark);font-size:12px;letter-spacing:-1px}
  .visited-tag{font-size:10px;color:var(--pine-light);font-weight:600}
  .notes-tag{font-size:10px;color:var(--bark)}

  .fab{position:fixed;bottom:calc(var(--safe-bottom) + 20px);right:20px;width:54px;height:54px;border-radius:50%;background:var(--pine);color:#E8F4E8;border:none;font-size:26px;cursor:pointer;z-index:200;box-shadow:0 4px 16px rgba(30,50,30,0.35);display:flex;align-items:center;justify-content:center}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,35,20,0.6);z-index:300;display:flex;align-items:flex-end}
  .modal{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 calc(var(--safe-bottom) + 20px)}
  .modal-handle{width:36px;height:4px;background:#C8C0B4;border-radius:2px;margin:12px auto 16px}
  .modal-body{padding:0 20px}
  .modal-title{font-size:17px;font-weight:700;color:var(--pine);margin-bottom:16px}
  .field-label{font-size:11px;font-weight:700;color:var(--pine);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px}
  .field{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #C8D4C0;background:#FAFAF6;color:#2A3A2A;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px}
  textarea.field{resize:none;line-height:1.6}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:8px;margin-top:4px}
  .btn-primary{flex:1;padding:13px;border-radius:10px;background:var(--pine);color:#E8F4E8;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
  .btn-primary:disabled{background:#A0A89A;cursor:not-allowed}
  .btn-secondary{padding:13px 20px;border-radius:10px;background:transparent;color:var(--stone);border:1.5px solid #C0B8AC;font-size:15px;font-family:inherit;cursor:pointer}
  .io-btn{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);margin-bottom:10px;cursor:pointer;width:100%;text-align:left;font-family:inherit}
  .io-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .io-label{font-size:15px;font-weight:600;color:#1A2A1A}
  .io-desc{font-size:12px;color:var(--stone);margin-top:1px}
  .empty{text-align:center;padding:48px 24px;color:var(--stone)}
  .empty-icon{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 18 L7 8 L12 13 L16 6 L20 11" stroke="#A8D4A8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="11" cy="4" r="2.5" fill="#7ABF7A" opacity="0.8"/>
      </svg>
      <div>
        <h1>North Idaho Trail Log</h1>
        <div class="header-sub">Post Falls · CDA · Rathdrum</div>
      </div>
    </div>
    <div class="header-right">
      <span class="version-tag">v1.1</span>
      <button class="icon-btn" onclick="openIO()">⇅</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" type="search" placeholder="Search trails or areas..." id="searchInput" oninput="renderAll()" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</div>

<div class="filter-bar">
  <div class="filter-row" id="filterRow"></div>
</div>
<div class="trail-count" id="trailCount"></div>
<div class="trail-list" id="trailList"></div>

<button class="fab" onclick="openAdd()">+</button>

<!-- Add Trail Modal -->
<div class="modal-overlay" id="addModal" style="display:none" onclick="closeAdd(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-title">Add a trail</div>
      <label class="field-label">Trail name *</label>
      <input class="field" id="f-name" placeholder="e.g. Mineral Ridge Trail">
      <label class="field-label">Area (leave blank for standalone trail)</label>
      <input class="field" id="f-area" placeholder="e.g. Farragut State Park">
      <label class="field-label">Region</label>
      <select class="field" id="f-region">
        <option value="Post Falls">Post Falls</option>
        <option value="Rathdrum">Rathdrum</option>
        <option value="Coeur d'Alene">Coeur d'Alene</option>
        <option value="Farragut Area">Farragut Area</option>
        <option value="Bike Parks">Bike Parks</option>
        <option value="Other">Other</option>
      </select>
      <label class="field-label">Location</label>
      <input class="field" id="f-location" placeholder="e.g. Harrison, ID">
      <label class="field-label">Distance from Post Falls</label>
      <input class="field" id="f-distance" placeholder="e.g. ~45 min">
      <label class="field-label">Trail length</label>
      <input class="field" id="f-length" placeholder="e.g. 3.4mi">
      <label class="field-label">Elevation</label>
      <input class="field" id="f-elevation" placeholder="e.g. 700ft descent">
      <div class="field-row">
        <div>
          <label class="field-label">Difficulty</label>
          <select class="field" id="f-difficulty">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <div>
          <label class="field-label">Type</label>
          <select class="field" id="f-type">
            <option value="xc">XC / Pedaling</option>
            <option value="flow">Flow / Park</option>
          </select>
        </div>
      </div>
      <label class="field-label">Summary</label>
      <textarea class="field" id="f-summary" rows="3" placeholder="Describe the trail..."></textarea>
      <label class="field-label">Tips</label>
      <textarea class="field" id="f-tips" rows="2" placeholder="Parking, hours, watch-outs..."></textarea>
      <div class="modal-actions">
        <button class="btn-primary" onclick="submitAdd()">Add trail</button>
        <button class="btn-secondary" onclick="closeAdd()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Export/Import Modal -->
<div class="modal-overlay" id="ioModal" style="display:none" onclick="closeIO(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-title">Export & Import</div>
      <button class="io-btn" onclick="exportData()">
        <div class="io-icon" style="background:#E8F4E8">📤</div>
        <div><div class="io-label">Export trail data</div><div class="io-desc">Save a JSON backup via share sheet</div></div>
      </button>
      <button class="io-btn" onclick="document.getElementById('importFile').click()">
        <div class="io-icon" style="background:#E8F0F5">📥</div>
        <div><div class="io-label">Import trail data</div><div class="io-desc">Load a previously exported JSON file</div></div>
      </button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <p style="font-size:12px;color:var(--stone);line-height:1.6;margin-top:10px">Export saves all trails, notes, ratings, and visited status. Import replaces current data — export first as a backup.</p>
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn-secondary" style="flex:1" onclick="closeIO()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const VERSION = '1.1';
const STORAGE_KEY = 'mtb-trails-v1';

// ── Default data ─────────────────────────────────────────────────────────────
// Structure: flat array of trail objects.
// Trails with an `area` property are grouped under that area card.
// Trails without `area` appear as standalone cards.
// `region` controls which collapsible section they appear in.

const DEFAULT_TRAILS = [
  // ── POST FALLS ──
  { id:1, name:"River Trails", area:"Q'emiln Park", region:"Post Falls", location:"Post Falls, ID", distance:"In town", difficulty:"beginner", type:"xc", status:"planned", length:"0.38–3.7mi loops", elevation:"Minimal", summary:"Mellow riverside trails along the Spokane River. Short loop options near river level are the most beginner-friendly. Great for building confidence close to home.", tips:"Start at Q'emiln river-level trailhead for flattest riding. Cliffs nearby — stay on trail. Open 6AM–9PM. Dogs not allowed.", userNotes:"", userRating:0, visitDate:"" },
  { id:2, name:"Community Forest Trails", area:"Q'emiln Park", region:"Post Falls", location:"Post Falls, ID", distance:"In town", difficulty:"intermediate", type:"xc", status:"planned", length:"Up to 6mi loops", elevation:"Moderate ups/downs", summary:"500-acre network through ravines, up hillsides, and along the river. More challenging than river-level trails — some steep and rocky sections.", tips:"Follow the colored dot/diamond trail markers. Download trail map from Post Falls Parks website. Build skills on river trails first.", userNotes:"", userRating:0, visitDate:"" },
  { id:3, name:"English Point Recreation Trails", area:null, region:"Post Falls", location:"Hayden, ID", distance:"~20 min", difficulty:"beginner", type:"xc", status:"planned", length:"Moderate", elevation:"Minimal", summary:"Gradual, well-maintained forested trails near Hayden Lake. Wide paths, mostly shaded, family-friendly. Good for easing into trail riding without steep climbs.", tips:"A low-pressure option for very first rides. Great dirt and forest trail feel without technical challenges.", userNotes:"", userRating:0, visitDate:"" },

  // ── RATHDRUM ──
  { id:4, name:"StormKing Parkway", area:"Rathdrum Mountain Park", region:"Rathdrum", location:"Rathdrum, ID", distance:"~15 min", difficulty:"beginner", type:"xc", status:"planned", length:"~3mi to top", elevation:"Gradual climb", summary:"Gradual dirt/gravel double track up to the flow trail system. Your warm-up climb — no technical sections, steady incline through pine forest.", tips:"Starts behind the gate at parking lot. Use this to access Skyline Trail. Open 7AM–9PM, free.", userNotes:"", userRating:0, visitDate:"" },
  { id:5, name:"Skyline Trail", area:"Rathdrum Mountain Park", region:"Rathdrum", location:"Rathdrum, ID", distance:"~15 min", difficulty:"intermediate", type:"flow", status:"planned", length:"~3mi descent", elevation:"1,200ft descent", summary:"New beginner flow trail with smooth berms, small rollable tabletops, and tighter corners to keep you honest. Access via StormKing Parkway climb.", tips:"Full loop is advanced beginner+. All tabletop jumps are rollable. Open 7AM–9PM, free.", userNotes:"", userRating:0, visitDate:"" },

  // ── COEUR D'ALENE ──
  { id:6, name:"Trail A (East)", area:"Canfield Mountain", region:"Coeur d'Alene", location:"Coeur d'Alene, ID", distance:"~25 min", difficulty:"beginner", type:"xc", status:"planned", length:"5.6mi", elevation:"Moderate rolling", summary:"Long, winding singletrack through forested Canfield Mountain. Wide and smooth from the west end, narrowing in later sections. The best beginner XC option on Canfield.", tips:"Park at Mountain Vista Dr trailhead. Lettered trails are milder than numbered. Open 5AM–11PM, free.", userNotes:"", userRating:0, visitDate:"" },

const REGIONS = ["Post Falls", "Rathdrum", "Coeur d'Alene", "Farragut Area", "Bike Parks"];
const REGION_ICONS = { "Post Falls":"🏡", "Rathdrum":"🌲", "Coeur d'Alene":"⛰️", "Farragut Area":"🏞️", "Bike Parks":"🚡" };

// ── State ─────────────────────────────────────────────────────────────────────
let trails = [];
let filters = { diff:'all', type:'all', status:'all' };
let collapsedRegions = new Set();
let expandedArea = null;   // "AreaName" or null
let expandedTrail = null;  // trail id or null
let editingNotes = null;   // trail id or null

// ── Storage ───────────────────────────────────────────────────────────────────
function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      // Migration: add missing fields to saved trails
      trails = parsed.map(t => ({
        area: null, region: 'Other', userNotes:'', userRating:0, visitDate:'', ...t
      }));
      return;
    }
  } catch(e) {}
  trails = JSON.parse(JSON.stringify(DEFAULT_TRAILS));
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trails)); } catch(e) {}
}
function getTrail(id) { return trails.find(t => t.id === id); }
function updateTrail(id, updates) {
  trails = trails.map(t => t.id === id ? {...t, ...updates} : t);
  saveData();
}

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const row = document.getElementById('filterRow');
  const groups = [
    { key:'diff', opts:[{v:'all',l:'All levels'},{v:'beginner',l:'Beginner'},{v:'intermediate',l:'Intermediate'},{v:'advanced',l:'Advanced'}] },
    { sep:true },
    { key:'type', opts:[{v:'all',l:'All types'},{v:'xc',l:'XC'},{v:'flow',l:'Flow'}] },
    { sep:true },
    { key:'status', opts:[{v:'all',l:'All'},{v:'planned',l:'Planned'},{v:'visited',l:'Visited'}] }
  ];
  row.innerHTML = groups.map(g => {
    if (g.sep) return '<div class="pill-sep"></div>';
    return g.opts.map(o =>
      `<button class="pill${filters[g.key]===o.v?' active':''}" onclick="setFilter('${g.key}','${o.v}')">${o.l}</button>`
    ).join('');
  }).join('');
}
function setFilter(key, val) {
  filters[key] = val;
  expandedArea = null; expandedTrail = null; editingNotes = null;
  buildFilters(); renderAll();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const visited = trails.filter(t => t.status==='visited').length;
  const rated = trails.filter(t => t.userRating > 0);
  const avg = rated.length ? (rated.reduce((a,t)=>a+t.userRating,0)/rated.length).toFixed(1)+'★' : '—';
  document.getElementById('stats').innerHTML = [
    {v:trails.length, l:'Trails'},{v:visited, l:'Visited'},
    {v:trails.length-visited, l:'To go'},{v:avg, l:'Avg rating'}
  ].map(s=>`<div class="stat"><div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function passesFilter(t) {
  if (filters.diff !== 'all' && t.difficulty !== filters.diff) return false;
  if (filters.type !== 'all' && t.type !== filters.type) return false;
  if (filters.status !== 'all' && t.status !== filters.status) return false;
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  if (q && !t.name.toLowerCase().includes(q) && !(t.area||'').toLowerCase().includes(q) && !t.location.toLowerCase().includes(q)) return false;
  return true;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  const filtered = trails.filter(passesFilter);
  document.getElementById('trailCount').textContent = `${filtered.length} of ${trails.length} trails`;
  renderStats();

  const listEl = document.getElementById('trailList');
  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">🌲</div><p>No trails match your filters.</p></div>`;
    return;
  }

  // Group by region
  let html = '';
  const allRegions = [...REGIONS, ...trails.map(t=>t.region).filter(r=>!REGIONS.includes(r)).filter((r,i,a)=>a.indexOf(r)===i)];

  allRegions.forEach(region => {
    const regionTrails = filtered.filter(t => t.region === region);
    if (!regionTrails.length) return;

    const isCollapsed = collapsedRegions.has(region);
    const icon = REGION_ICONS[region] || '📍';
    const visitedCount = regionTrails.filter(t=>t.status==='visited').length;

    html += `
      <div class="section-header" onclick="toggleRegion('${esc(region)}')">
        <div class="section-title">
          ${icon} ${esc(region)}
          <span class="section-count">${visitedCount}/${regionTrails.length} visited</span>
        </div>
        <span class="section-chevron${isCollapsed?'':' open'}">▼</span>
      </div>
      <div class="section-body" id="region-${esc(region)}" style="${isCollapsed?'display:none':''}">
    `;

    // Group trails within region by area
    const areas = [...new Set(regionTrails.map(t=>t.area).filter(Boolean))];
    const standalone = regionTrails.filter(t=>!t.area);

    // Area cards
    areas.forEach(area => {
      const areaTrails = regionTrails.filter(t=>t.area===area);
      const aVisited = areaTrails.filter(t=>t.status==='visited').length;
      const isAreaOpen = expandedArea === area;
      html += renderAreaCard(area, areaTrails, aVisited, isAreaOpen);
    });

    // Standalone trails
    standalone.forEach(t => {
      html += renderStandaloneCard(t);
    });

    html += `</div>`;
  });

  listEl.innerHTML = html;
}

function renderAreaCard(area, areaTrails, visitedCount, isOpen) {
  const hasVisited = visitedCount > 0;
  const firstTrail = areaTrails[0];
  return `
    <div class="area-card${hasVisited?' has-visited':''}">
      <div class="area-header" onclick="toggleArea('${esc(area)}')">
        <div class="area-icon">${getAreaIcon(area)}</div>
        <div class="area-info">
          <div class="area-name">${esc(area)}</div>
          <div class="area-loc">${esc(firstTrail.location)} · ${esc(firstTrail.distance)}</div>
          <div class="area-meta">
            <span class="area-progress">${visitedCount}/${areaTrails.length} trails ridden</span>
            ${areaTrails.some(t=>t.userNotes) ? '<span class="notes-tag">📝 notes</span>' : ''}
          </div>
        </div>
        <span class="chevron${isOpen?' open':''}">›</span>
      </div>
      ${isOpen ? `<div class="sub-list">${areaTrails.map(t=>renderSubTrail(t)).join('')}</div>` : ''}
    </div>`;
}

function renderSubTrail(t) {
  const visited = t.status === 'visited';
  const isOpen = expandedTrail === t.id;
  const editingThis = editingNotes === t.id;
  const stars = t.userRating > 0 ? '★'.repeat(t.userRating)+'☆'.repeat(5-t.userRating) : '';
  return `
    <div class="sub-trail" onclick="toggleTrail(${t.id})">
      <button class="sub-check${visited?' done':''}" onclick="event.stopPropagation();toggleVisited(${t.id})">${visited?'✓':''}</button>
      <div class="sub-info">
        <div class="sub-name">${esc(t.name)}</div>
        <div class="sub-meta">
          <span class="badge badge-${t.difficulty}">${cap(t.difficulty)}</span>
          <span class="badge badge-${t.type}">${t.type==='xc'?'XC':'Flow'}</span>
          ${stars ? `<span class="stars-sm">${stars}</span>` : ''}
          ${visited && t.visitDate ? `<span class="visited-tag">✓ ${esc(t.visitDate)}</span>` : ''}
          ${t.userNotes ? '<span class="notes-tag">📝</span>' : ''}
        </div>
      </div>
      <span class="sub-chevron">${isOpen?'▼':'›'}</span>
    </div>
    ${isOpen ? `
    <div class="sub-detail open">
      <div class="detail-meta-row">
        <span class="detail-meta-item">📏 ${esc(t.length)}</span>
        <span class="detail-meta-item">⛰ ${esc(t.elevation)}</span>
      </div>
      <p class="detail-summary">${esc(t.summary)}</p>
      ${t.tips?`<div class="tips-box"><div class="tips-label">Trail tips</div><div class="tips-text">${esc(t.tips)}</div></div>`:''}
      <div class="section-lbl">Your rating</div>
      <div class="stars-input" style="margin-bottom:12px">
        ${[1,2,3,4,5].map(s=>`<button class="star-btn" onclick="setRating(${t.id},${s})" style="color:${s<=t.userRating?'#8B6914':'#D4C9B0'}">${s<=t.userRating?'★':'☆'}</button>`).join('')}
      </div>
      <div class="section-lbl">Your notes</div>
      ${editingThis ? `
        <textarea class="notes-area" id="notesInput-${t.id}">${esc(t.userNotes)}</textarea>
        <div style="margin-bottom:12px"><button class="btn-save" onclick="saveNotes(${t.id})">Save</button><button class="btn-cancel-sm" onclick="cancelNotes()">Cancel</button></div>
      ` : `
        <div class="notes-tap${t.userNotes?' filled':' empty'}" onclick="startNotes(${t.id})">${t.userNotes?esc(t.userNotes):'Tap to add notes...'}</div>
      `}
      <div class="btn-row">
        <button class="btn-visit ${visited?'unmark':'mark'}" onclick="toggleVisited(${t.id})">${visited?'Mark as planned':'Mark as visited ✓'}</button>
        <button class="btn-remove" onclick="removeTrail(${t.id})">Remove</button>
      </div>
    </div>` : ''}`;
}

function renderStandaloneCard(t) {
  const visited = t.status === 'visited';
  const isOpen = expandedTrail === t.id;
  const editingThis = editingNotes === t.id;
  const stars = t.userRating > 0 ? '★'.repeat(t.userRating)+'☆'.repeat(5-t.userRating) : '';
  return `
    <div class="trail-card${visited?' visited':''}">
      <div class="card-header" onclick="toggleTrail(${t.id})">
        <button class="visit-btn${visited?' done':''}" onclick="event.stopPropagation();toggleVisited(${t.id})">${visited?'✓':''}</button>
        <div class="card-info">
          <div class="card-name">${esc(t.name)}</div>
          <div class="card-loc">${esc(t.location)} · ${esc(t.distance)}</div>
          <div class="card-meta">
            <span class="badge badge-${t.difficulty}">${cap(t.difficulty)}</span>
            <span class="badge badge-${t.type}">${t.type==='xc'?'XC':'Flow'}</span>
            ${stars?`<span class="stars-sm">${stars}</span>`:''}
            ${visited&&t.visitDate?`<span class="visited-tag">✓ ${esc(t.visitDate)}</span>`:''}
            ${t.userNotes?'<span class="notes-tag">📝</span>':''}
          </div>
        </div>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>
      ${isOpen?`
      <div class="card-detail open">
        <div class="detail-meta-row">
          <span class="detail-meta-item">📏 ${esc(t.length)}</span>
          <span class="detail-meta-item">⛰ ${esc(t.elevation)}</span>
          <span class="detail-meta-item">${t.type==='xc'?'🚵 XC':'🌊 Flow'}</span>
        </div>
        <p class="detail-summary">${esc(t.summary)}</p>
        ${t.tips?`<div class="tips-box"><div class="tips-label">Trail tips</div><div class="tips-text">${esc(t.tips)}</div></div>`:''}
        <div class="section-lbl">Your rating</div>
        <div class="stars-input" style="margin-bottom:12px">
          ${[1,2,3,4,5].map(s=>`<button class="star-btn" onclick="setRating(${t.id},${s})" style="color:${s<=t.userRating?'#8B6914':'#D4C9B0'}">${s<=t.userRating?'★':'☆'}</button>`).join('')}
        </div>
        <div class="section-lbl">Your notes</div>
        ${editingThis?`
          <textarea class="notes-area" id="notesInput-${t.id}">${esc(t.userNotes)}</textarea>
          <div style="margin-bottom:12px"><button class="btn-save" onclick="saveNotes(${t.id})">Save</button><button class="btn-cancel-sm" onclick="cancelNotes()">Cancel</button></div>
        `:`
          <div class="notes-tap${t.userNotes?' filled':' empty'}" onclick="startNotes(${t.id})">${t.userNotes?esc(t.userNotes):'Tap to add notes...'}</div>
        `}
        <div class="btn-row">
          <button class="btn-visit ${visited?'unmark':'mark'}" onclick="toggleVisited(${t.id})">${visited?'Mark as planned':'Mark as visited ✓'}</button>
          <button class="btn-remove" onclick="removeTrail(${t.id})">Remove</button>
        </div>
      </div>`:``}
    </div>`;
}

function getAreaIcon(area) {
  const icons = { 'Silver Mountain':'🚡', "Q'emiln Park":'🌊', 'Canfield Mountain':'⛰️', 'Rathdrum Mountain Park':'🌲', 'Farragut State Park':'🏞️' };
  return icons[area] || '🗺️';
}

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleRegion(region) {
  if (collapsedRegions.has(region)) collapsedRegions.delete(region);
  else collapsedRegions.add(region);
  renderAll();
}

function toggleArea(area) {
  expandedArea = expandedArea === area ? null : area;
  expandedTrail = null; editingNotes = null;
  renderAll();
  if (expandedArea) setTimeout(()=>{ const el = document.querySelector('.area-card.has-visited, .area-card'); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 50);
}

function toggleTrail(id) {
  expandedTrail = expandedTrail === id ? null : id;
  editingNotes = null;
  renderAll();
  if (expandedTrail) setTimeout(()=>{
    const el = document.getElementById('card-'+id) || document.querySelector(`[onclick="toggleTrail(${id})"]`)?.closest('.sub-trail');
    if (el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 50);
}

function toggleVisited(id) {
  const t = getTrail(id);
  const nowVisited = t.status !== 'visited';
  updateTrail(id, {
    status: nowVisited?'visited':'planned',
    visitDate: nowVisited ? new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''
  });
  renderStats(); renderAll();
}

function setRating(id, r) {
  const t = getTrail(id);
  updateTrail(id, { userRating: t.userRating===r ? 0 : r });
  renderStats(); renderAll();
}

function startNotes(id) {
  editingNotes = id;
  renderAll();
  setTimeout(()=>{
    const el = document.getElementById('notesInput-'+id);
    if (el) { el.focus(); el.setSelectionRange(el.value.length,el.value.length); }
  }, 50);
}
function saveNotes(id) {
  const el = document.getElementById('notesInput-'+id);
  if (el) updateTrail(id, { userNotes: el.value });
  editingNotes = null; renderAll();
}
function cancelNotes() { editingNotes = null; renderAll(); }

function removeTrail(id) {
  if (!confirm('Remove this trail from your log?')) return;
  trails = trails.filter(t=>t.id!==id);
  if (expandedTrail===id) expandedTrail=null;
  saveData(); renderStats(); renderAll();
}

// ── Add Trail ─────────────────────────────────────────────────────────────────
function openAdd() {
  ['name','area','location','distance','length','elevation','summary','tips'].forEach(k=>{
    document.getElementById('f-'+k).value='';
  });
  document.getElementById('f-region').value='Post Falls';
  document.getElementById('f-difficulty').value='beginner';
  document.getElementById('f-type').value='xc';
  document.getElementById('addModal').style.display='flex';
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}
function closeAdd(e) {
  if (!e||e.target===document.getElementById('addModal')) document.getElementById('addModal').style.display='none';
}
function submitAdd() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const newId = trails.length ? Math.max(...trails.map(t=>t.id))+1 : 1;
  trails.push({
    id:newId, name,
    area: document.getElementById('f-area').value.trim() || null,
    region: document.getElementById('f-region').value,
    location: document.getElementById('f-location').value.trim(),
    distance: document.getElementById('f-distance').value.trim(),
    length: document.getElementById('f-length').value.trim(),
    elevation: document.getElementById('f-elevation').value.trim(),
    difficulty: document.getElementById('f-difficulty').value,
    type: document.getElementById('f-type').value,
    summary: document.getElementById('f-summary').value.trim(),
    tips: document.getElementById('f-tips').value.trim(),
    status:'planned', userNotes:'', userRating:0, visitDate:''
  });
  saveData();
  document.getElementById('addModal').style.display='none';
  renderStats(); renderAll();
}

// ── Export / Import ───────────────────────────────────────────────────────────
function openIO() { document.getElementById('ioModal').style.display='flex'; }
function closeIO(e) {
  if (!e||e.target===document.getElementById('ioModal')) document.getElementById('ioModal').style.display='none';
}
function exportData() {
  const json = JSON.stringify(trails, null, 2);
  const blob = new Blob([json],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href=url; a.download=`trail-log-${date}.json`; a.click();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) { alert('Invalid file.'); return; }
      if (!confirm(`Import ${data.length} trails? This replaces your current data.`)) return;
      trails = data.map(t=>({ area:null, region:'Other', userNotes:'', userRating:0, visitDate:'', ...t }));
      saveData();
      expandedArea=null; expandedTrail=null; editingNotes=null;
      document.getElementById('ioModal').style.display='none';
      renderStats(); buildFilters(); renderAll();
    } catch(err) { alert('Could not read file: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function cap(s) { return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
